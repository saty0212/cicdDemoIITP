name: CI/CD Pipeline for Java App

# Trigger on push to main or pull requests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Use Ubuntu runner (free)
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code from repo
    - name: Checkout code
      uses: actions/checkout@v4  # Official GitHub action to clone repo

    # Step 2: Set up Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'  # Eclipse Temurin JDK

    # Step 3: Compile Java code
    - name: Compile with Maven (or javac)
      run: |
        # Assuming no Maven; use javac for simplicity
        mkdir -p classes
        javac -d classes *.java  # Compile all .java files
        echo "Build successful!"

    # Step 4: Run tests (JUnit)
    - name: Run JUnit Tests
      run: |
        # Download JUnit JAR (simulate; in real, use Maven)
        curl -L -o junit.jar https://repo1.maven.org/maven2/org/junit/jupiter/junit-jupiter-engine/5.10.0/junit-jupiter-engine-5.10.0.jar
        curl -L -o hamcrest.jar https://repo1.maven.org/maven2/org/hamcrest/hamcrest/2.2/hamcrest-2.2.jar
        java -cp "classes:junit.jar:hamcrest.jar" org.junit.platform.console.ConsoleLauncher --select-class MathUtilsTest
      continue-on-error: false  # Fail pipeline if tests fail

    # Step 5: Create artifact (JAR)
    - name: Create JAR Artifact
      run: |
        cd classes
        jar cf ../myapp.jar *
        echo "JAR created: myapp.jar"

    # Step 6: Upload artifact (for download/review)
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: myapp-jar
        path: myapp.jar

    # Step 7: Simple "Deploy" (echo to simulate; in real, deploy to cloud)
    - name: Simulate Deployment
      run: |
        echo "Deploying to staging..."
        # Example: scp myapp.jar user@server:/app/
        echo "Deployment successful!"
